<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intier Gaming</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0f172a,#020617);
  color:white;
  text-align:center;
}
.header {
  padding:15px;
  background:#020617;
  display:flex;
  justify-content:space-between;
}
.menu,.profileBtn{cursor:pointer;font-size:20px;}
.card {
  background:#1e293b;
  padding:20px;
  border-radius:15px;
  margin:20px auto;
  max-width:400px;
}
button {
  width:80%;
  padding:12px;
  margin:8px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  color:white;
}
input {
  padding:10px;
  width:80%;
  border-radius:10px;
  border:none;
  margin:10px;
}
.hidden {display:none;}
.menuBox {
  position:absolute;
  top:60px;
  left:10px;
  background:#1e293b;
  padding:10px;
  border-radius:10px;
}
.profilePage {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#020617;
  display:none;
}
</style>
</head>

<body>

<div class="header">
  <span class="menu" onclick="toggleMenu()">☰</span>
  🎮 Intier Gaming
  <span class="profileBtn" onclick="openProfile()">👤</span>
</div>

<div id="menuBox" class="menuBox hidden">
  <p onclick="goHome()">Home</p>
  <p onclick="openProfile()">Profile</p>
</div>

<div class="card" id="login">
  <h3>Login / Signup</h3>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">
  <button onclick="signup()">Signup</button>
  <button onclick="loginUser()">Login</button>
</div>

<div class="card hidden" id="usernameBox">
  <h3>Create Username</h3>
  <input id="usernameInput" placeholder="username">
  <button onclick="saveUsername()">Save</button>
</div>

<div class="card hidden" id="home">
  <h3 id="welcome"></h3>
  <button onclick="startQuiz()">Start Quiz</button>
  <p id="timer"></p>
</div>

<div class="card hidden" id="game">
  <h3 id="question"></h3>
  <div id="options"></div>
  <p id="score"></p>
</div>

<div class="card">
  <h3>🏆 Leaderboard</h3>
  <ul id="leaderboard"></ul>
</div>

<div id="profilePage" class="profilePage">
  <h2>Profile</h2>
  <p id="pEmail"></p>
  <p id="pUsername"></p>
  <p id="pScore"></p>
  <button onclick="logout()">Logout</button>
  <button onclick="closeProfile()">Close</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getDatabase, ref, set, get, update, onValue } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDgjlWP9Ovp8lI-aS5ypaLUfb1by0ttejY",
  authDomain: "intier-gaming.firebaseapp.com",
  databaseURL: "https://intier-gaming-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "intier-gaming"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

let user=null, points=0, current=0;

/* UI SWITCH */
function show(id){
 ["login","usernameBox","home","game"].forEach(i=>{
  document.getElementById(i).classList.add("hidden");
 });
 document.getElementById(id).classList.remove("hidden");
}

/* AUTH */
onAuthStateChanged(auth, async(u)=>{
 if(u){
  user=u;
  let snap=await get(ref(db,"users/"+user.uid));
  if(snap.exists()){
    let d=snap.val();
    welcome.innerText="Welcome "+d.username;
    pEmail.innerText=user.email;
    pUsername.innerText=d.username;
    pScore.innerText="Score: "+(d.score||0);
    show("home");
  } else show("usernameBox");
 } else show("login");
});

window.signup=async()=>{
 try{ await createUserWithEmailAndPassword(auth,email.value,password.value);}
 catch(e){alert(e.message);}
};

window.loginUser=async()=>{
 try{ await signInWithEmailAndPassword(auth,email.value,password.value);}
 catch(e){alert(e.message);}
};

window.logout=()=>signOut(auth);

/* USERNAME */
window.saveUsername=async()=>{
 let uname=usernameInput.value.trim();
 if(uname.includes(" ")) return alert("No spaces");
 uname="@"+uname;

 await set(ref(db,"users/"+user.uid),{
  username:uname,
  score:0
 });

 show("home");
};

/* QUESTIONS (50) */
let questions = Array.from({length:50},(_,i)=>({
 q:`Question ${i+1}: ${i+1}+1?`,
 options:[`${i+2}`,`${i+3}`,`${i}`],
 answer:`${i+2}`
}));

/* START QUIZ */
window.startQuiz=()=>{
 questions.sort(()=>Math.random()-0.5);
 points=0;
 current=0;
 show("game");
 showQuestion();
};

function showQuestion(){
 let q=questions[current];
 question.innerText=q.q;
 options.innerHTML=q.options.map(o=>`<button onclick="answer('${o}')">${o}</button>`).join("");
}

/* LIVE POINT UPDATE */
window.answer=async(ans)=>{

 if(ans===questions[current].answer){

   let refUser=ref(db,"users/"+user.uid);
   let snap=await get(refUser);
   let old=snap.val().score||0;

   let newScore=old+25;

   await update(refUser,{score:newScore});

   await set(ref(db,"leaderboard/"+user.uid),{
     username:snap.val().username,
     score:newScore
   });

   pScore.innerText="Score: "+newScore;
   points+=25;
 }

 current++;

 if(current<questions.length){
  showQuestion();
 } else {
  show("home");
 }

 score.innerText="Points: "+points;
};

/* LEADERBOARD */
onValue(ref(db,"leaderboard"), snap=>{
 let html="";
 snap.forEach(c=>{
  let d=c.val();
  html+=`<li>${d.username} - ${d.score}</li>`;
 });
 leaderboard.innerHTML=html;
});

/* TIMER */
setInterval(()=>{
 let now=Math.floor(Date.now()/1000);
 let r=300-(now%300);
 timer.innerText="Refresh in "+Math.floor(r/60)+":"+String(r%60).padStart(2,"0");
},1000);

/* UI */
window.toggleMenu=()=>menuBox.classList.toggle("hidden");
window.openProfile=()=>profilePage.style.display="block";
window.closeProfile=()=>profilePage.style.display="none";
window.goHome=()=>profilePage.style.display="none";

</script>

</body>
  </html>
