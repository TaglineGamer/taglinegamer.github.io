<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intier Gaming</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f172a, #020617);
  color: white;
  text-align: center;
}
.header {
  padding: 15px;
  background: #020617;
  display: flex;
  justify-content: space-between;
}
.menu, .profileBtn { cursor: pointer; }
.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 15px;
  margin: 20px auto;
  max-width: 400px;
}
button {
  width: 80%;
  padding: 12px;
  margin: 8px;
  border-radius: 12px;
  border: none;
  background: #22c55e;
  color: white;
}
input {
  padding: 10px;
  width: 80%;
  border-radius: 10px;
  border: none;
  margin: 10px;
}
.hidden { display: none; }
.menuBox {
  position: absolute;
  top: 60px;
  left: 10px;
  background: #1e293b;
  padding: 10px;
  border-radius: 10px;
}
.profilePage {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#020617;
  display:none;
}
</style>
</head>

<body>

<div class="header">
  <span class="menu" onclick="toggleMenu()">☰</span>
  🎮 Intier Gaming
  <span class="profileBtn" onclick="openProfile()">👤</span>
</div>

<div id="menuBox" class="menuBox hidden">
  <p onclick="goHome()">Home</p>
  <p onclick="openProfile()">Profile</p>
</div>

<div class="card" id="login">
  <h2>Login / Sign Up</h2>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">
  <button onclick="signup()">Sign Up</button>
  <button onclick="loginUser()">Login</button>
</div>

<div class="card hidden" id="usernameBox">
  <h2>Create Username</h2>
  <input id="usernameInput" placeholder="username">
  <button onclick="saveUsername()">Save Username</button>
</div>

<div class="card hidden" id="main">
  <h2 id="welcome"></h2>
  <button onclick="startQuiz()">▶ Start Quiz</button>
  <p id="timer"></p>
</div>

<div class="card hidden" id="game">
  <h3 id="question"></h3>
  <div id="options"></div>
  <p id="score"></p>
</div>

<div class="card">
  <h3>🏆 Leaderboard</h3>
  <ul id="leaderboard"></ul>
</div>

<div id="profilePage" class="profilePage">
  <h2>Profile</h2>
  <p id="pEmail"></p>
  <p id="pUsername"></p>
  <p id="pScore"></p>
  <button onclick="logout()">Logout</button>
  <button onclick="closeProfile()">Close</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getDatabase, ref, set, get, update, onValue } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDgjlWP9Ovp8lI-aS5ypaLUfb1by0ttejY",
  authDomain: "intier-gaming.firebaseapp.com",
  databaseURL: "https://intier-gaming-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "intier-gaming"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

let user=null, points=0, current=0;

const questions=[
  {q:"2+2?", options:["3","4","5"], answer:"4"},
  {q:"Capital of India?", options:["Delhi","Mumbai"], answer:"Delhi"}
];

onAuthStateChanged(auth, async(u)=>{
  if(u){
    user=u;
    login.classList.add("hidden");

    let snap=await get(ref(db,"users/"+user.uid));
    let data=snap.val();

    if(!data?.username){
      usernameBox.classList.remove("hidden");
    } else {
      startMain(data);
    }
  }
});

function startMain(data){
  usernameBox.classList.add("hidden");
  main.classList.remove("hidden");

  welcome.innerText="Welcome "+data.username;
  pEmail.innerText=user.email;
  pUsername.innerText=data.username;
  pScore.innerText="Score: "+(data.score||0);
}

/* AUTH */
window.signup=async()=>{
  try{
    await createUserWithEmailAndPassword(auth,email.value,password.value);
    alert("Signup successful");
  }catch(e){
    alert(e.message);
  }
};

window.loginUser=async()=>{
  try{
    await signInWithEmailAndPassword(auth,email.value,password.value);
    alert("Login successful");
  }catch(e){
    alert(e.message);
  }
};

window.logout=()=>signOut(auth);

/* USERNAME */
window.saveUsername=async()=>{
  let uname=usernameInput.value.trim();
  if(uname.includes(" ")) return alert("No spaces allowed");

  uname="@"+uname;

  let check=await get(ref(db,"usernames/"+uname));
  if(check.exists()) return alert("Username taken");

  await set(ref(db,"users/"+user.uid),{
    email:user.email,
    username:uname,
    score:0
  });

  await set(ref(db,"usernames/"+uname), user.uid);

  startMain({username:uname,score:0});
};

/* GAME */
window.startQuiz=()=>{
  points=0; current=0;
  main.classList.add("hidden");
  game.classList.remove("hidden");
  showQuestion();
};

function showQuestion(){
  let q=questions[current];
  question.innerText=q.q;

  let html="";
  q.options.forEach(o=>{
    html+=`<button onclick="answer('${o}')">${o}</button>`;
  });
  options.innerHTML=html;
}

window.answer=async(ans)=>{
  if(ans===questions[current].answer) points+=25;
  current++;

  if(current<questions.length){
    showQuestion();
  } else {
    game.classList.add("hidden");
    main.classList.remove("hidden");

    let refUser=ref(db,"users/"+user.uid);
    let snap=await get(refUser);
    let old=snap.val().score||0;

    if(points>old){
      await update(refUser,{score:points});
      await set(ref(db,"leaderboard/"+user.uid),{
        username:snap.val().username,
        score:points
      });
    }

    loadLeaderboard();
  }

  score.innerText="Points: "+points;
};

/* LEADERBOARD */
function loadLeaderboard(){
  onValue(ref(db,"leaderboard"), snap=>{
    let html="";
    snap.forEach(child=>{
      let d=child.val();
      html+=`<li>${d.username} - ${d.score}</li>`;
    });
    leaderboard.innerHTML=html;
  });
}

/* GLOBAL TIMER */
setInterval(()=>{
  let now=Math.floor(Date.now()/1000);
  let remaining=300-(now%300);

  if(remaining===300) loadLeaderboard();

  let m=Math.floor(remaining/60);
  let s=remaining%60;

  timer.innerText="Refresh in "+m+":"+String(s).padStart(2,"0");
},1000);

/* UI */
window.toggleMenu=()=>menuBox.classList.toggle("hidden");
window.openProfile=()=>profilePage.style.display="block";
window.closeProfile=()=>profilePage.style.display="none";
window.goHome=()=>profilePage.style.display="none";

</script>

</body>
</html>
