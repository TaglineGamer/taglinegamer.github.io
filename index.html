<!DOCTYPE html>
<html>
<head>
  <title>Intier Gaming</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #0f172a, #020617);
      color: white;
      text-align: center;
    }

    .header {
      padding: 15px;
      background: #020617;
      font-size: 22px;
      color: #22c55e;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 15px;
      margin: 20px auto;
      max-width: 400px;
    }

    button {
      width: 80%;
      padding: 12px;
      margin: 8px;
      border-radius: 12px;
      border: none;
      background: #22c55e;
      color: white;
      font-size: 16px;
    }

    input {
      padding: 10px;
      width: 80%;
      border-radius: 10px;
      border: none;
      margin: 10px;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

<div class="header">🎮 Intier Gaming</div>

<!-- LOGIN -->
<div class="card" id="login">
  <h2>Enter Your Name</h2>
  <input type="text" id="playerName" placeholder="Your name">
  <button onclick="saveName()">Continue</button>
</div>

<!-- START -->
<div class="card hidden" id="startScreen">
  <h2 id="welcome"></h2>
  <button onclick="startQuiz()">▶ Start Quiz</button>
</div>

<!-- GAME -->
<div class="card hidden" id="game">
  <h3 id="question"></h3>
  <div id="options"></div>
  <p id="score">Points: 0</p>
</div>

<!-- LEADERBOARD -->
<div class="card">
  <h3>🏆 Leaderboard (Your Device)</h3>
  <ul id="leaderboard"></ul>
</div>

<script>

let player = "";
let points = 0;
let current = 0;

let questions = [
  {q:"2+2?", options:["3","4","5"], answer:"4"},
  {q:"Capital of India?", options:["Delhi","Mumbai","Goa"], answer:"Delhi"},
  {q:"3x3?", options:["6","9","12"], answer:"9"}
];

// Load saved user
window.onload = function(){
  loadLeaderboard();

  let savedName = localStorage.getItem("player");

  if(savedName){
    player = savedName;
    document.getElementById("login").classList.add("hidden");
    document.getElementById("startScreen").classList.remove("hidden");
    document.getElementById("welcome").innerText = "Welcome back " + player;
  }
};

function saveName(){
  player = document.getElementById("playerName").value;

  if(player === ""){
    alert("Enter your name!");
    return;
  }

  localStorage.setItem("player", player);

  document.getElementById("login").classList.add("hidden");
  document.getElementById("startScreen").classList.remove("hidden");

  document.getElementById("welcome").innerText = "Welcome " + player;
}

function startQuiz(){
  points = 0;
  current = 0;

  document.getElementById("startScreen").classList.add("hidden");
  document.getElementById("game").classList.remove("hidden");

  showQuestion();
}

function showQuestion(){
  let q = questions[current];
  document.getElementById("question").innerText = q.q;

  let html = "";
  q.options.forEach(opt=>{
    html += `<button onclick="checkAnswer('${opt}')">${opt}</button>`;
  });

  document.getElementById("options").innerHTML = html;
}

function checkAnswer(ans){
  if(ans === questions[current].answer){
    points += 25;
  }

  current++;

  if(current < questions.length){
    showQuestion();
  } else {
    document.getElementById("question").innerText = "🎉 Finished!";
    document.getElementById("options").innerHTML = "";

    saveScore();
    loadLeaderboard();
  }

  document.getElementById("score").innerText = "Points: " + points;
}

// Save leaderboard
function saveScore(){
  let leaderboard = JSON.parse(localStorage.getItem("leaderboard")) || [];

  leaderboard.push({name: player, score: points});

  leaderboard.sort((a,b)=>b.score - a.score);

  leaderboard = leaderboard.slice(0,5);

  localStorage.setItem("leaderboard", JSON.stringify(leaderboard));
}

// Load leaderboard
function loadLeaderboard(){
  let leaderboard = JSON.parse(localStorage.getItem("leaderboard")) || [];
  let html = "";

  leaderboard.forEach(p=>{
    html += `<li>${p.name} - ${p.score}</li>`;
  });

  document.getElementById("leaderboard").innerHTML = html;
}

</script>

</body>
</html>
