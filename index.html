<!DOCTYPE html>
<html>
<head>
<title>Intier Gaming</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0f172a,#020617);
  color:white;
  text-align:center;
}

/* TOP BAR */
.topbar{
  display:flex;
  justify-content:space-between;
  padding:10px;
}
.menu, .profileIcon{
  font-size:22px;
  cursor:pointer;
}

/* MENU */
.menuBox{
  position:absolute;
  top:50px;
  left:10px;
  background:#1e293b;
  padding:10px;
  border-radius:10px;
  display:none;
}

/* CARD */
.card {
  background:#1e293b;
  padding:20px;
  border-radius:15px;
  margin:20px auto;
  max-width:400px;
}
button {
  width:80%;
  padding:12px;
  margin:8px;
  border-radius:10px;
  border:none;
  background:#22c55e;
  color:white;
}
input {
  padding:10px;
  width:80%;
  border-radius:10px;
  border:none;
  margin:10px;
}
.hidden {display:none;}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="menu" onclick="toggleMenu()">☰</div>
  <div>🎮 Intier Gaming</div>
  <div class="profileIcon" onclick="openProfile()">👤</div>
</div>

<!-- MENU -->
<div class="menuBox" id="menuBox">
  <p onclick="goHome()">🏠 Home</p>
  <p onclick="openProfile()">👤 Profile</p>
</div>

<!-- LOGIN -->
<div class="card" id="login">
<h3>Login / Signup</h3>
<input type="email" id="email" placeholder="Email"><br>
<input type="password" id="password" placeholder="Password"><br>
<button onclick="signup()">Signup</button>
<button onclick="login()">Login</button>
</div>

<!-- USERNAME -->
<div class="card hidden" id="usernameCard">
<h3>Create Username</h3>
<input type="text" id="username" placeholder="@username">
<button onclick="saveUsername()">Save Username</button>
</div>

<!-- HOME -->
<div class="card hidden" id="home">
<h3 id="welcome"></h3>
<button onclick="startQuiz()">▶ Start Quiz</button>
</div>

<!-- PROFILE -->
<div class="card hidden" id="profile">
<h3>👤 Profile</h3>
<p id="pEmail"></p>
<p id="pUsername"></p>
<p id="pScore"></p>
<button onclick="logout()">Logout</button>
</div>

<!-- GAME -->
<div class="card hidden" id="game">
<h3 id="question"></h3>
<div id="options"></div>
<p id="score"></p>
</div>

<!-- LEADERBOARD -->
<div class="card">
<h3>🏆 Global Leaderboard</h3>
<p id="timer"></p>
<ul id="leaderboard"></ul>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, push, onValue, set, get, update } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDgjlWP9Ovp8lI-aS5ypaLUfb1by0ttejY",
  authDomain: "intier-gaming.firebaseapp.com",
  databaseURL: "https://intier-gaming-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "intier-gaming"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

let user=null;
let points=0;
let current=0;

// MENU
window.toggleMenu=()=>{
 menuBox.style.display = menuBox.style.display==="block"?"none":"block";
}

// UI
function show(id){
 ["login","usernameCard","home","game","profile"].forEach(i=>{
  document.getElementById(i).classList.add("hidden");
 });
 document.getElementById(id).classList.remove("hidden");
}

// AUTH
onAuthStateChanged(auth, async(u)=>{
 if(u){
  user=u;
  checkUsername();
 } else {
  show("login");
 }
});

// USERNAME CHECK
async function checkUsername(){
 const snap=await get(ref(db,"users/"+user.uid));
 if(snap.exists()){
  const data=snap.val();
  welcome.innerText="Welcome "+data.username;
  show("home");
 } else {
  show("usernameCard");
 }
}

// AUTH FUNCTIONS
window.signup=async()=>{
 try{
  await createUserWithEmailAndPassword(auth,email.value,password.value);
 }catch(e){alert(e.message)}
}

window.login=async()=>{
 try{
  await signInWithEmailAndPassword(auth,email.value,password.value);
 }catch(e){alert(e.message)}
}

window.logout=()=>signOut(auth);

// USERNAME SAVE
window.saveUsername=async()=>{
 let uname=username.value.trim();
 if(!uname.startsWith("@")) uname="@"+uname;

 if(uname.includes(" ")){alert("No spaces");return;}
 if(!/^@[a-zA-Z0-9_]+$/.test(uname)){alert("Invalid");return;}

 const check=await get(ref(db,"usernames/"+uname));
 if(check.exists()){alert("Taken");return;}

 await set(ref(db,"users/"+user.uid),{
  username:uname,
  email:user.email,
  score:0
 });

 await set(ref(db,"usernames/"+uname),user.uid);

 checkUsername();
}

// PROFILE
window.openProfile=async()=>{
 const snap=await get(ref(db,"users/"+user.uid));
 const data=snap.val();

 pEmail.innerText="Email: "+data.email;
 pUsername.innerText="Username: "+data.username;
 pScore.innerText="Points: "+data.score;

 show("profile");
}

window.goHome=()=>show("home");

// GAME
const questions=[
 {q:"2+2?",options:["3","4","5"],answer:"4"},
 {q:"Capital of India?",options:["Delhi","Mumbai"],answer:"Delhi"},
 {q:"3x3?",options:["6","9"],answer:"9"}
];

window.startQuiz=()=>{
 points=0;
 current=0;
 show("game");
 showQuestion();
}

function showQuestion(){
 let q=questions[current];
 question.innerText=q.q;

 let html="";
 q.options.forEach(opt=>{
  html+=`<button onclick="checkAnswer('${opt}')">${opt}</button>`;
 });

 options.innerHTML=html;
}

window.checkAnswer=async(ans)=>{
 if(ans===questions[current].answer) points+=25;
 current++;

 if(current<questions.length){
  showQuestion();
 } else {
  question.innerText="🎉 Finished!";
  options.innerHTML="";

  const snap=await get(ref(db,"users/"+user.uid));
  const data=snap.val();

  let newScore=(data.score||0)+points;

  await update(ref(db,"users/"+user.uid),{
    score:newScore
  });

  await push(ref(db,"leaderboard"),{
    username:data.username,
    score:newScore
  });
 }

 score.innerText="Points: "+points;
}

// LEADERBOARD
function loadLeaderboard(){
 onValue(ref(db,"leaderboard"),snap=>{
  let arr=[];
  snap.forEach(child=>arr.push(child.val()));

  arr.sort((a,b)=>b.score-a.score);

  let html="";
  arr.slice(0,10).forEach(d=>{
   html+=`<li>${d.username} - ${d.score}</li>`;
  });

  leaderboard.innerHTML=html;
 });
}
loadLeaderboard();

// TIMER (5 min)
let time=300;

setInterval(()=>{
 time--;
 let m=Math.floor(time/60);
 let s=time%60;
 timer.innerText="Refresh in "+m+":"+s;

 if(time<=0){
  loadLeaderboard();
  time=300;
 }
},1000);

</script>

</body>
  </html>
