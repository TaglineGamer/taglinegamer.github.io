<!DOCTYPE html>
<html>
<head>
<title>Intier Gaming</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg,#0f172a,#020617);
  color: white;
  text-align: center;
}
.card {
  background:#1e293b;
  padding:20px;
  border-radius:15px;
  margin:20px auto;
  max-width:400px;
}
button {
  width:80%;
  padding:12px;
  margin:8px;
  border-radius:10px;
  border:none;
  background:#22c55e;
  color:white;
}
input {
  padding:10px;
  width:80%;
  border-radius:10px;
  border:none;
  margin:10px;
}
.hidden {display:none;}
</style>
</head>

<body>

<h2>🎮 Intier Gaming</h2>

<!-- LOGIN -->
<div class="card" id="login">
<h3>Login / Signup</h3>
<input type="email" id="email" placeholder="Email"><br>
<input type="password" id="password" placeholder="Password"><br>
<button onclick="signup()">Signup</button>
<button onclick="login()">Login</button>
<button onclick="googleLogin()">Login with Google</button>
</div>

<!-- USERNAME -->
<div class="card hidden" id="usernameCard">
<h3>Create Username</h3>
<input type="text" id="username" placeholder="@username">
<button onclick="saveUsername()">Save Username</button>
</div>

<!-- HOME -->
<div class="card hidden" id="home">
<h3 id="welcome"></h3>
<button onclick="startQuiz()">▶ Start Quiz</button>
<button onclick="logout()">Logout</button>
</div>

<!-- GAME -->
<div class="card hidden" id="game">
<h3 id="question"></h3>
<div id="options"></div>
<p id="score"></p>
</div>

<!-- LEADERBOARD -->
<div class="card">
<h3>🏆 Global Leaderboard</h3>
<ul id="leaderboard"></ul>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, push, onValue, set, get } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, GoogleAuthProvider, onAuthStateChanged, signOut, signInWithRedirect, getRedirectResult } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDgjlWP9Ovp8lI-aS5ypaLUfb1by0ttejY",
  authDomain: "intier-gaming.firebaseapp.com",
  databaseURL: "https://intier-gaming-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "intier-gaming"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

let user = null;
let points = 0;
let current = 0;

// ✅ FIX GOOGLE REDIRECT RESULT
getRedirectResult(auth).catch(()=>{});

const questions = [
 {q:"2+2?", options:["3","4","5"], answer:"4"},
 {q:"Capital of India?", options:["Delhi","Mumbai"], answer:"Delhi"},
 {q:"3x3?", options:["6","9"], answer:"9"}
];

onAuthStateChanged(auth, async(u)=>{
 if(u){
  user = u;
  checkUsername();
 } else {
  show("login");
 }
});

function show(id){
 ["login","usernameCard","home","game"].forEach(i=>{
  document.getElementById(i).classList.add("hidden");
 });
 document.getElementById(id).classList.remove("hidden");
}

async function checkUsername(){
 const snap = await get(ref(db,"users/"+user.uid));
 if(snap.exists()){
  document.getElementById("welcome").innerText="Welcome "+snap.val().username;
  show("home");
 } else {
  show("usernameCard");
 }
}

// EMAIL AUTH
window.signup = async ()=>{
 try{
  await createUserWithEmailAndPassword(auth,email.value,password.value);
 }catch(e){
  alert(e.message);
 }
}

window.login = async ()=>{
 try{
  await signInWithEmailAndPassword(auth,email.value,password.value);
 }catch(e){
  alert(e.message);
 }
}

// ✅ GOOGLE LOGIN (FIXED)
window.googleLogin = async ()=>{
 try{
  const provider = new GoogleAuthProvider();
  await signInWithRedirect(auth, provider);
 }catch(e){
  alert(e.message);
 }
}

window.logout = ()=>signOut(auth);

// USERNAME SYSTEM
window.saveUsername = async ()=>{
 let uname = username.value.trim();

 if(!uname.startsWith("@")) uname = "@"+uname;

 if(uname.includes(" ")){
  alert("No spaces allowed");
  return;
 }

 if(!/^@[a-zA-Z0-9_]+$/.test(uname)){
  alert("Only letters, numbers, _ allowed");
  return;
 }

 const check = await get(ref(db,"usernames/"+uname));
 if(check.exists()){
  alert("Username already taken");
  return;
 }

 await set(ref(db,"users/"+user.uid),{
  username: uname,
  score: 0
 });

 await set(ref(db,"usernames/"+uname),user.uid);

 checkUsername();
}

// GAME
window.startQuiz = ()=>{
 points=0;
 current=0;
 show("game");
 showQuestion();
}

function showQuestion(){
 let q=questions[current];
 question.innerText=q.q;

 let html="";
 q.options.forEach(opt=>{
  html+=`<button onclick="checkAnswer('${opt}')">${opt}</button>`;
 });

 options.innerHTML=html;
}

window.checkAnswer = async(ans)=>{
 if(ans===questions[current].answer) points+=25;

 current++;

 if(current<questions.length){
  showQuestion();
 } else {
  question.innerText="🎉 Finished!";
  options.innerHTML="";
  await push(ref(db,"leaderboard"),{
    uid:user.uid,
    score:points
  });
 }

 score.innerText="Points: "+points;
}

// LEADERBOARD
onValue(ref(db,"leaderboard"),snap=>{
 let html="";
 snap.forEach(child=>{
  html+=`<li>${child.val().score}</li>`;
 });
 leaderboard.innerHTML=html;
});

</script>

</body>
</html>
