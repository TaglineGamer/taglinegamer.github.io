<!DOCTYPE html>
<html>
<head>

<title>Intier Gaming</title>

<style>
body { margin:0; font-family:Arial; background:linear-gradient(135deg,#0f172a,#020617); color:white; text-align:center;}
.header { padding:15px; background:#020617; display:flex; justify-content:space-between;}
.menu,.profileBtn{cursor:pointer;}
.card{background:#1e293b;padding:20px;border-radius:15px;margin:20px auto;max-width:400px;}
button{width:80%;padding:12px;margin:8px;border-radius:12px;border:none;background:#22c55e;color:white;}
input{padding:10px;width:80%;border-radius:10px;border:none;margin:10px;}
.hidden{display:none;}
.menuBox{position:absolute;top:60px;left:10px;background:#1e293b;padding:10px;border-radius:10px;}
.profilePage{position:fixed;top:0;left:0;width:100%;height:100%;background:#020617;display:none;}
</style>
</head>

<body>

<div class="header">
  <span class="menu" onclick="toggleMenu()">☰</span>
  🎮 Intier Gaming
  <span class="profileBtn" onclick="openProfile()">👤</span>
</div>

<div id="menuBox" class="menuBox hidden">
  <p onclick="goHome()">Home</p>
  <p onclick="openProfile()">Profile</p>
</div>

<div class="card" id="login">
  <h2>Login / Sign Up</h2>
  <input type="email" id="email">
  <input type="password" id="password">
  <button onclick="signup()">Sign Up</button>
  <button onclick="loginUser()">Login</button>
</div>

<div class="card hidden" id="usernameBox">
  <h2>Create Username</h2>
  <input id="usernameInput">
  <button onclick="saveUsername()">Save Username</button>
</div>

<div class="card hidden" id="main">
  <h2 id="welcome"></h2>
  <button onclick="startQuiz()">▶ Start Quiz</button>
  <p id="timer"></p>
</div>

<div class="card hidden" id="game">
  <h3 id="question"></h3>
  <div id="options"></div>
  <p id="score"></p>
</div>

<div class="card">
  <h3>🏆 Leaderboard</h3>
  <ul id="leaderboard"></ul>
</div>

<div id="profilePage" class="profilePage">
  <h2>Profile</h2>
  <p id="pEmail"></p>
  <p id="pUsername"></p>
  <p id="pScore"></p>
  <button onclick="logout()">Logout</button>
  <button onclick="closeProfile()">Close</button>
