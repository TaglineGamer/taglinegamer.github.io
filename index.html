<!DOCTYPE html>
<html>
<head>
  <title>Intier Gaming</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #0f172a, #020617);
      color: white;
      text-align: center;
    }

    .header {
      padding: 15px;
      background: #020617;
      font-size: 22px;
      color: #22c55e;
      font-weight: bold;
    }

    .container {
      padding: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 15px;
      margin: 20px auto;
      max-width: 400px;
      box-shadow: 0 0 15px rgba(0,0,0,0.6);
    }

    button {
      width: 80%;
      padding: 12px;
      margin: 8px;
      border-radius: 12px;
      border: none;
      background: #22c55e;
      color: white;
      font-size: 16px;
      transition: 0.2s;
    }

    button:hover {
      background: #16a34a;
    }

    .score {
      font-size: 20px;
      margin-top: 10px;
    }

    .redeem {
      background: #334155;
      padding: 15px;
      border-radius: 10px;
      margin-top: 15px;
    }

    .restart {
      background: #f59e0b;
    }
  </style>
</head>

<body>

<div class="header">🎮 Intier Gaming</div>

<div class="container">

  <div class="card">
    <h2 id="question">Click Start to Play</h2>
    <div id="options"></div>
    <button onclick="startQuiz()">▶ Start Quiz</button>
    <button class="restart" onclick="startQuiz()">🔄 Restart</button>
    <div class="score" id="score">Points: 0</div>
  </div>

  <div class="card redeem">
    <h3>💰 Redeem Rewards</h3>
    <p>1000 Points = ₹10</p>
    <p>3000 Points = ₹30</p>
    <p>10000 Points = ₹100</p>
    <p>🚧 Coming Soon</p>
  </div>

</div>

<script>

let questions = [
  {q:"What is 2+2?", options:["3","4","5"], answer:"4"},
  {q:"Capital of India?", options:["Delhi","Mumbai","Kolkata"], answer:"Delhi"},
  {q:"5 x 3 = ?", options:["15","10","20"], answer:"15"},
  {q:"Sun rises from?", options:["East","West","North"], answer:"East"}
];

let current = 0;
let points = 0;

function startQuiz(){
  current = 0;
  points = 0;
  showQuestion();
}

function showQuestion(){
  let q = questions[current];
  document.getElementById("question").innerText = q.q;

  let html = "";
  q.options.forEach(opt=>{
    html += `<button onclick="checkAnswer('${opt}')">${opt}</button><br>`;
  });

  document.getElementById("options").innerHTML = html;
}

function checkAnswer(ans){
  if(ans === questions[current].answer){
    points += 25;
  }

  current++;

  if(current < questions.length){
    showQuestion();
  } else {
    document.getElementById("question").innerText = "🎉 Quiz Finished!";
    document.getElementById("options").innerHTML = "";
  }

  document.getElementById("score").innerText = "Points: " + points;
}

</script>

</body>
</html>
