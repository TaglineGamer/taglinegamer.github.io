<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intier Gaming</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0f172a,#020617);
  color:white;
  text-align:center;
}
.card {
  background:#1e293b;
  padding:20px;
  border-radius:15px;
  margin:20px auto;
  max-width:400px;
}
button {
  width:80%;
  padding:12px;
  margin:8px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  color:white;
}
input {
  padding:10px;
  width:80%;
  border-radius:10px;
  border:none;
  margin:10px;
}
.hidden { display:none; }
</style>
</head>

<body>

<h2>🎮 Intier Gaming</h2>

<!-- LOGIN -->
<div class="card" id="login">
  <h3>Login / Signup</h3>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">
  <button onclick="signup()">Signup</button>
  <button onclick="loginUser()">Login</button>
</div>

<!-- USERNAME -->
<div class="card hidden" id="usernameBox">
  <h3>Create Username</h3>
  <input id="usernameInput" placeholder="username">
  <button onclick="saveUsername()">Save</button>
</div>

<!-- HOME -->
<div class="card hidden" id="home">
  <h3 id="welcome"></h3>
  <button onclick="startQuiz()">Start Quiz</button>
  <p id="timer"></p>
</div>

<!-- GAME -->
<div class="card hidden" id="game">
  <h3 id="question"></h3>
  <div id="options"></div>
  <p id="score"></p>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getDatabase, ref, set, get, update } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDgjlWP9Ovp8lI-aS5ypaLUfb1by0ttejY",
  authDomain: "intier-gaming.firebaseapp.com",
  databaseURL: "https://intier-gaming-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "intier-gaming"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

let user, points=0, current=0;

// UI SWITCH
function show(id){
  ["login","usernameBox","home","game"].forEach(i=>{
    document.getElementById(i).classList.add("hidden");
  });
  document.getElementById(id).classList.remove("hidden");
}

// AUTH STATE
onAuthStateChanged(auth, async(u)=>{
  if(u){
    user=u;

    let snap = await get(ref(db,"users/"+user.uid));
    if(snap.exists()){
      document.getElementById("welcome").innerText="Welcome "+snap.val().username;
      show("home");
    } else {
      show("usernameBox");
    }
  } else {
    show("login");
  }
});

// SIGNUP
window.signup = async ()=>{
  try{
    await createUserWithEmailAndPassword(auth,email.value,password.value);
    alert("Signup success");
  }catch(e){
    alert(e.message);
  }
};

// LOGIN
window.loginUser = async ()=>{
  try{
    await signInWithEmailAndPassword(auth,email.value,password.value);
    alert("Login success");
  }catch(e){
    alert(e.message);
  }
};

// USERNAME
window.saveUsername = async ()=>{
  let uname = usernameInput.value.trim();

  if(uname.includes(" ")) return alert("No spaces");
  uname = "@"+uname;

  await set(ref(db,"users/"+user.uid),{
    username: uname,
    score: 0
  });

  show("home");
};

// QUESTIONS (50)
let questions = [
{q:"2+2?",options:["3","4","5"],answer:"4"},
{q:"5+5?",options:["10","11","12"],answer:"10"},
{q:"10-2?",options:["6","8","9"],answer:"8"},
{q:"7+3?",options:["10","11","9"],answer:"10"},
{q:"3+4?",options:["7","8","6"],answer:"7"},
{q:"6+2?",options:["8","7","9"],answer:"8"},
{q:"4+4?",options:["8","6","7"],answer:"8"},
{q:"9-3?",options:["6","5","7"],answer:"6"},
{q:"8-2?",options:["6","5","7"],answer:"6"},
{q:"2*3?",options:["6","5","7"],answer:"6"},
{q:"3*3?",options:["9","8","7"],answer:"9"},
{q:"4*2?",options:["8","7","9"],answer:"8"},
{q:"10/2?",options:["5","4","6"],answer:"5"},
{q:"12/3?",options:["4","5","6"],answer:"4"},
{q:"5*2?",options:["10","8","9"],answer:"10"},
{q:"6*2?",options:["12","11","10"],answer:"12"},
{q:"7*1?",options:["7","6","8"],answer:"7"},
{q:"9+1?",options:["10","11","9"],answer:"10"},
{q:"8+2?",options:["10","9","11"],answer:"10"},
{q:"7+2?",options:["9","10","8"],answer:"9"},
{q:"HTML stands for?",options:["Hyper Text Markup Language","High Text","None"],answer:"Hyper Text Markup Language"},
{q:"CSS used for?",options:["Styling","Database","Logic"],answer:"Styling"},
{q:"JS stands for?",options:["JavaScript","JavaStyle","None"],answer:"JavaScript"}
];

// START QUIZ
window.startQuiz = ()=>{
  questions.sort(()=>Math.random()-0.5);
  points=0;
  current=0;
  show("game");
  showQuestion();
};

function showQuestion(){
  let q=questions[current];
  question.innerText=q.q;

  let html="";
  q.options.forEach(o=>{
    html+=`<button onclick="answer('${o}')">${o}</button>`;
  });

  options.innerHTML=html;
}

// ANSWER
window.answer = async(ans)=>{
  if(ans===questions[current].answer) points+=25;
  current++;

  if(current<questions.length){
    showQuestion();
  } else {
    show("home");
  }

  score.innerText="Points: "+points;
};

// TIMER
setInterval(()=>{
  let now=Math.floor(Date.now()/1000);
  let r=300-(now%300);
  timer.innerText="Refresh in "+Math.floor(r/60)+":"+String(r%60).padStart(2,"0");
},1000);

</script>

</body>
</html>
