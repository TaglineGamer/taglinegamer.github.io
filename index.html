<!DOCTYPE html>
<html>
<head>
  <title>Intier Gaming</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #0f172a, #020617);
      color: white;
      text-align: center;
    }

    .header {
      padding: 15px;
      background: #020617;
      font-size: 22px;
      color: #22c55e;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 15px;
      margin: 20px auto;
      max-width: 400px;
    }

    input {
      padding: 10px;
      width: 80%;
      border-radius: 10px;
      border: none;
      margin: 10px;
    }

    button {
      width: 80%;
      padding: 12px;
      margin: 8px;
      border-radius: 12px;
      border: none;
      background: #22c55e;
      color: white;
      font-size: 16px;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

<div class="header">🎮 Intier Gaming</div>

<!-- LOGIN -->
<div class="card" id="login">
  <h2>Enter Your Name</h2>
  <input type="text" id="playerName" placeholder="Your name">
  <button onclick="startGame()">Start Game</button>
</div>

<!-- GAME -->
<div class="card hidden" id="game">
  <h2 id="welcome"></h2>
  <h3 id="question"></h3>
  <div id="options"></div>
  <p id="score">Points: 0</p>
</div>

<script>

let player = "";
let points = 0;
let current = 0;

let questions = [
  {q:"2+2?", options:["3","4","5"], answer:"4"},
  {q:"Capital of India?", options:["Delhi","Mumbai","Goa"], answer:"Delhi"},
  {q:"3x3?", options:["6","9","12"], answer:"9"}
];

function startGame(){
  player = document.getElementById("playerName").value;

  if(player === ""){
    alert("Enter your name!");
    return;
  }

  document.getElementById("login").classList.add("hidden");
  document.getElementById("game").classList.remove("hidden");

  document.getElementById("welcome").innerText = "Welcome " + player;

  points = 0;
  current = 0;

  showQuestion();
}

function showQuestion(){
  let q = questions[current];
  document.getElementById("question").innerText = q.q;

  let html = "";
  q.options.forEach(opt=>{
    html += `<button onclick="checkAnswer('${opt}')">${opt}</button>`;
  });

  document.getElementById("options").innerHTML = html;
}

function checkAnswer(ans){
  if(ans === questions[current].answer){
    points += 25;
  }

  current++;

  if(current < questions.length){
    showQuestion();
  } else {
    document.getElementById("question").innerText = "🎉 Finished!";
    document.getElementById("options").innerHTML = "";
  }

  document.getElementById("score").innerText = "Points: " + points;
}

</script>

</body>
</html>
