<!DOCTYPE html>
<html>
<head>
<title>Intier Gaming</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0f172a,#020617);
  color:white;
  text-align:center;
}
.topbar{
  display:flex;
  justify-content:space-between;
  padding:10px;
}
.menu,.profileIcon{
  font-size:22px;
  cursor:pointer;
}
.menuBox{
  position:absolute;
  top:50px;
  left:10px;
  background:#1e293b;
  padding:10px;
  border-radius:10px;
  display:none;
}
.card{
  background:#1e293b;
  padding:20px;
  border-radius:15px;
  margin:20px auto;
  max-width:400px;
}
button{
  width:80%;
  padding:12px;
  margin:8px;
  border-radius:10px;
  border:none;
  background:#22c55e;
  color:white;
}
input{
  padding:10px;
  width:80%;
  border-radius:10px;
  border:none;
  margin:10px;
}
.hidden{display:none;}
</style>
</head>

<body>

<!-- TOP -->
<div class="topbar">
  <div class="menu" onclick="toggleMenu()">☰</div>
  <div>🎮 Intier Gaming</div>
  <div class="profileIcon" onclick="openProfile()">👤</div>
</div>

<div class="menuBox" id="menuBox">
  <p onclick="goHome()">🏠 Home</p>
  <p onclick="openProfile()">👤 Profile</p>
</div>

<!-- LOGIN -->
<div class="card" id="login">
<h3>Login / Signup</h3>
<input type="email" id="email" placeholder="Email"><br>
<input type="password" id="password" placeholder="Password"><br>
<button onclick="signup()">Signup</button>
<button onclick="login()">Login</button>
</div>

<!-- USERNAME -->
<div class="card hidden" id="usernameCard">
<h3>Create Username</h3>
<input type="text" id="username" placeholder="@username">
<button onclick="saveUsername()">Save Username</button>
</div>

<!-- HOME -->
<div class="card hidden" id="home">
<h3 id="welcome"></h3>
<button onclick="startQuiz()">▶ Start Quiz</button>
</div>

<!-- PROFILE -->
<div class="card hidden" id="profile">
<h3>👤 Profile</h3>
<p id="pEmail"></p>
<p id="pUsername"></p>
<p id="pScore"></p>
<button onclick="logout()">Logout</button>
</div>

<!-- GAME -->
<div class="card hidden" id="game">
<h3 id="question"></h3>
<div id="options"></div>
<p id="score"></p>
</div>

<!-- LEADERBOARD -->
<div class="card">
<h3>🏆 Global Leaderboard</h3>
<p id="timer"></p>
<ul id="leaderboard"></ul>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, set, get, onValue, update } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDgjlWP9Ovp8lI-aS5ypaLUfb1by0ttejY",
  authDomain: "intier-gaming.firebaseapp.com",
  databaseURL: "https://intier-gaming-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "intier-gaming"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

let user=null,points=0,current=0;

// MENU
window.toggleMenu=()=>menuBox.style.display=menuBox.style.display==="block"?"none":"block";

// UI
function show(id){
 ["login","usernameCard","home","game","profile"].forEach(i=>{
  document.getElementById(i).classList.add("hidden");
 });
 document.getElementById(id).classList.remove("hidden");
}

// AUTH
onAuthStateChanged(auth,async(u)=>{
 if(u){user=u;checkUsername();}
 else show("login");
});

// USERNAME CHECK
async function checkUsername(){
 const snap=await get(ref(db,"users/"+user.uid));
 if(snap.exists()){
  welcome.innerText="Welcome "+snap.val().username;
  show("home");
 } else show("usernameCard");
}

// AUTH FUNCTIONS
window.signup=async()=>{
 try{await createUserWithEmailAndPassword(auth,email.value,password.value);}
 catch(e){alert(e.message);}
}

window.login=async()=>{
 try{await signInWithEmailAndPassword(auth,email.value,password.value);}
 catch(e){alert(e.message);}
}

window.logout=()=>signOut(auth);

// USERNAME
window.saveUsername=async()=>{
 let uname=username.value.trim();
 if(!uname.startsWith("@")) uname="@"+uname;
 if(uname.includes(" ")) return alert("No spaces allowed");
 if(!/^@[a-zA-Z0-9_]+$/.test(uname)) return alert("Invalid username");

 const check=await get(ref(db,"usernames/"+uname));
 if(check.exists()) return alert("Taken");

 await set(ref(db,"users/"+user.uid),{
  username:uname,
  email:user.email,
  score:0
 });

 await set(ref(db,"usernames/"+uname),user.uid);
 checkUsername();
}

// PROFILE
window.openProfile=async()=>{
 const snap=await get(ref(db,"users/"+user.uid));
 const d=snap.val();
 pEmail.innerText="Email: "+d.email;
 pUsername.innerText="Username: "+d.username;
 pScore.innerText="Points: "+d.score;
 show("profile");
}

window.goHome=()=>show("home");

// GAME
const questions=[
 {q:"2+2?",options:["3","4","5"],answer:"4"},
 {q:"Capital of India?",options:["Delhi","Mumbai"],answer:"Delhi"},
 {q:"3x3?",options:["6","9"],answer:"9"}
];

window.startQuiz=()=>{
 points=0;current=0;
 show("game");
 showQuestion();
}

function showQuestion(){
 let q=questions[current];
 question.innerText=q.q;
 options.innerHTML=q.options.map(o=>`<button onclick="checkAnswer('${o}')">${o}</button>`).join("");
}

window.checkAnswer=async(ans)=>{
 if(ans===questions[current].answer) points+=25;
 current++;

 if(current<questions.length) showQuestion();
 else{
  question.innerText="🎉 Finished!";
  options.innerHTML="";

  const snap=await get(ref(db,"users/"+user.uid));
  const d=snap.val();
  let newScore=(d.score||0)+points;

  // UPDATE USER SCORE
  await update(ref(db,"users/"+user.uid),{score:newScore});

  // ANTI-CHEAT LEADERBOARD
  await set(ref(db,"leaderScores/"+user.uid),{
    username:d.username,
    score:newScore
  });
 }

 score.innerText="Points: "+points;
}

// LEADERBOARD
function loadLeaderboard(){
 onValue(ref(db,"leaderScores"),snap=>{
  let arr=[];
  snap.forEach(c=>arr.push(c.val()));
  arr.sort((a,b)=>b.score-a.score);

  leaderboard.innerHTML=arr.slice(0,10)
    .map(d=>`<li>${d.username} - ${d.score}</li>`).join("");
 });
}
loadLeaderboard();

// TIMER
let t=300;
setInterval(()=>{
 t--;
 timer.innerText="Refresh in "+Math.floor(t/60)+":"+String(t%60).padStart(2,"0");
 if(t<=0){loadLeaderboard();t=300;}
},1000);

</script>
</body>
  </html>
